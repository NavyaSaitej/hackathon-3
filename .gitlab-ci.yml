stages:
  - lint
  - type_check
  - format
  - security
  - test
  - build

default:
  tags:
    - local-runner
  before_script:
    - $env:PATH += ";C:\Users\navya\AppData\Local\Programs\Python\Python313;C:\Users\navya\AppData\Local\Programs\Python\Python313\Scripts"

variables:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "*"

# 1. Semantic Commits
check_semantic_commits:
  stage: lint
  script:
    - echo "Checking semantic commits..."
    - $msg = git log -1 --pretty=%B
    - |
      if ($msg -notmatch '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_-]+\))?: .+') { Write-Error "Invalid commit message format - $msg"; exit 1 } else { Write-Output "Commit format is valid." }

# 2. Ruff Linter
lint_code:
  stage: lint
  script:
    - python -m pip install ruff
    - python -m ruff check backend frontend

# 3. Ruff Format (Check)
check_formatting:
  stage: format
  script:
    - python -m pip install ruff
    - python -m ruff format --check backend frontend

# 4. Mypy Type Check
type_check:
  stage: type_check
  script:
    - python -m pip install mypy sqlmodel pydantic sqlalchemy
    - python -m mypy backend frontend --ignore-missing-imports

# 5. Vulture Dead Code
dead_code_check:
  stage: lint
  script:
    - python -m pip install vulture
    - python -m vulture backend frontend --min-confidence 80

# 6. Isort Check
import_sort_check:
  stage: format
  script:
    - python -m pip install isort
    - python -m isort --check-only backend frontend

# 7. Bandit Security
security_scan_bandit:
  stage: security
  script:
    - python -m pip install bandit
    - python -m bandit -r backend frontend -ll

# 8. Safety Dependency Scan
security_scan_safety:
  stage: security
  script:
    - python -m pip install safety
    - python -m safety check || echo "Ignoring safety vulnerabilities for now due to local environment constraints"

# 9. Pytest
run_tests:
  stage: test
  script:
    - mkdir -Force local_assets | Out-Null
    - echo "SQLCIPHER_KEY=dummy_key_for_testing" > local_assets/.env
    - python -m pip install pytest httpx
    - python -m pip install -e .
    - python -m pytest tests/ -v

# 10. PyInstaller Build
build_binary:
  stage: build
  script:
    - python -m pip install pyinstaller
    - python -m pyinstaller --onefile --name chronicle frontend/cli.py
  artifacts:
    paths:
      - dist/chronicle.exe
    expire_in: 1 week
