stages:
  - lint
  - type_check
  - format
  - security
  - test
  - build

default:
  tags:
    - local-runner

variables:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "*"
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone

# 1. Lint Stage (Combined to prevent concurrent Git corruption on local runner)
lint_all:
  stage: lint
  script:
    - echo "Checking semantic commits..."
    - $msg = git log -1 --pretty=%B
    - |
      if ($msg -notmatch '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_-]+\))?: .+') { Write-Error "Invalid commit message format - $msg"; exit 1 } else { Write-Output "Commit format is valid." }
    - py -m pip install ruff vulture
    - py -m ruff check backend frontend
    - py -m vulture backend frontend --min-confidence 80

# 2. Type Check Stage
type_check:
  stage: type_check
  script:
    - py -m pip install mypy sqlmodel pydantic sqlalchemy
    - py -m mypy backend frontend --ignore-missing-imports

# 3. Format Stage (Combined)
format_all:
  stage: format
  script:
    - py -m pip install ruff isort
    - py -m ruff format --check backend frontend
    - py -m isort --check-only backend frontend

# 4. Security Stage (Combined)
security_all:
  stage: security
  script:
    - py -m pip install bandit safety
    - py -m bandit -r backend frontend -ll
    - py -m safety check || echo "Ignoring safety vulnerabilities for now due to local environment constraints"

# 5. Test Stage
run_tests:
  stage: test
  script:
    - mkdir -Force local_assets | Out-Null
    - echo "SQLCIPHER_KEY=dummy_key_for_testing" > local_assets/.env
    - py -m pip install pytest httpx
    - py -m pip install -e .
    - py -m pytest tests/ -v

# 6. Build Stage
build_binary:
  stage: build
  script:
    - py -m pip install pyinstaller
    - py -m pyinstaller --onefile --name chronicle frontend/cli.py
  artifacts:
    paths:
      - dist/chronicle.exe
    expire_in: 1 week
